{% extends "base.html" %}

{% block title %}Publications — {{ site.name }}{% endblock %}

{% block content %}

<section class="page-header">
  <div class="container">
    <h1 class="page-title">Publications</h1>
  </div>
</section>

<section class="section">
  <div class="container">

    {% for year in years %}
      <div class="year-group">
        <div class="year-label">{{ year }}</div>

        <div class="pub-list">
          {% for pub in pubs_by_year[year] %}
            {% include "partials/pub_card.html" %}
          {% endfor %}
        </div>
      </div>
    {% endfor %}
    <p class="page-subtitle" style="margin-top:0.35rem">
      <sup>*</sup> Equal contribution.
    </p>
  </div>
</section>

{% endblock %}
